<text x="620" y="129" font-size="20" font-weight="bold" text-anchor="middle" fill="#343a40" font-family="'DejaVu Sans Mono','Consolas',monospace">/hydraia:feature  &lt;what you want built&gt;</text>
<text x="620" y="166" font-size="13" text-anchor="middle" fill="#868e96">Language gate · Model guard</text>
