<text x="620" y="52" font-size="34" font-weight="bold" text-anchor="middle" fill="#343a40">How Hydraia works</text>
<text x="620" y="82" font-size="15" text-anchor="middle" fill="#868e96">One command runs the whole feature pipeline — you stay on Opus 4.8, it decides everything else.</text>
