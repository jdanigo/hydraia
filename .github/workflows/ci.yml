name: ci
on:
  push:
  pull_request:
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JSON manifests
        run: |
          for f in .claude-plugin/plugin.json .claude-plugin/marketplace.json hooks/hooks.json; do
            python3 -m json.tool "$f" > /dev/null && echo "OK $f"
          done
      - name: Bash syntax
        run: bash -n hooks/preflight.sh hooks/doctor.sh hooks/gate.sh hooks/plancheck.sh hooks/summary.sh hooks/agents.sh hooks/config.sh
      - name: Dashboard server syntax
        run: node -c dashboard/server.js && echo "server.js OK"
      - name: Discovery counts
        run: |
          skills=$(find skills -name SKILL.md | wc -l | tr -d ' ')
          agents=$(ls agents/*.md | wc -l | tr -d ' ')
          echo "skills=$skills agents=$agents"
          test "$skills" -eq 46 || { echo "expected 46 skills, got $skills"; exit 1; }
          test "$agents" -eq 26 || { echo "expected 26 agents, got $agents"; exit 1; }
      - name: License completeness
        run: |
          for l in superpowers ecc-agents ecc-security ecc uiux caveman fullstack-dev-skills; do
            test -f "LICENSES/${l}-LICENSE" || { echo "missing LICENSES/${l}-LICENSE"; exit 1; }
          done
          test -f NOTICE && test -f LICENSE && echo "OK licenses"

  # End-to-end proof that the zero-touch dependency install actually lands
  # codegraph + markitdown on macOS, Linux, and Windows — no manual steps, no sudo.
  install-e2e:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Auto-install (no sudo, non-interactive)
        shell: bash
        run: bash hooks/doctor.sh --install --yes | tee out.log
      - name: Assert both tools installed (never 'missing')
        shell: bash
        run: |
          res="$(grep '^RESULT' out.log | tail -1)"
          echo "on ${{ matrix.os }}: $res"
          test -n "$res" || { echo "no RESULT line — installer did not finish"; exit 1; }
          case "$res" in
            *missing*) echo "FAIL: a managed tool did not install on ${{ matrix.os }}"; exit 1 ;;
            *) echo "PASS: codegraph + markitdown both ok/installed" ;;
          esac
